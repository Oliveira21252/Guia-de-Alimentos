    <style>
        :root {
            --primary-color: #e91e63;
            --primary-dark: #c2185b;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-secondary: #546e7a;
            --border-radius: 16px;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, #e91e63, #880e4f);
            color: white;
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(233, 30, 99, 0.4);
        }

        header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.95;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Grid Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
        }

        /* Card Styles */
        .food-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
        }

        .food-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(233, 30, 99, 0.15);
        }

        /* Header Clicável */
        .card-header {
            padding: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            background: white;
            position: relative;
            z-index: 2;
            transition: background 0.3s;
        }

        .food-card.active .card-header {
            background-color: #fff0f5;
            border-bottom: 1px solid #ffebee;
        }

        /* Emoji Container */
        .card-emoji {
            font-size: 40px;
            margin-right: 20px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            border-radius: 50%;
            flex-shrink: 0;
            transition: transform 0.3s;
        }

        .food-card.active .card-emoji {
            transform: scale(1.1);
            background: #ffebee;
        }

        /* Texto do Card */
        .card-info {
            flex-grow: 1;
        }

        .card-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--text-main);
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .card-subtitle {
            font-size: 0.85rem;
            color: var(--primary-color);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Seta */
        .card-arrow {
            font-size: 24px;
            color: #bdc3c7;
            transition: transform 0.3s ease;
        }

        .food-card.active .card-arrow {
            transform: rotate(180deg);
            color: var(--primary-color);
        }

        /* Conteúdo Detalhado */
        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0, 1, 0, 1);
            background-color: #fafafa;
        }

        .card-content-inner {
            padding: 20px 25px 25px 105px; /* Alinhado com o texto */
        }

        .detail-list {
            list-style: none;
            border-left: 3px solid var(--primary-color);
            padding-left: 15px;
        }

        .detail-list li {
            margin-bottom: 12px;
            font-size: 0.95rem;
            color: var(--text-secondary);
            position: relative;
        }

        .detail-list li:last-child {
            margin-bottom: 0;
        }

        /* Responsividade */
        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            .card-content-inner { padding-left: 25px; padding-right: 25px; border-left: none; }
            .detail-list { padding-left: 0; border-left: none; }
            .card-emoji { width: 50px; height: 50px; font-size: 30px; margin-right: 15px; }
        }

        footer {
            text-align: center;

            color: #7f8c8d;
            font-size: 0.9rem;
            padding: 20px;

    </style>

        function renderCards() {

                        <div class="card-info">

                        </div>

                    <div class="card-body">
                        <div class="card-content-inner">
                            <ul class="detail-list">
                                ${detailsList}
                            </ul>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleCard(header) {
            const card = header.parentElement;
            const body = card.querySelector('.card-body');
            
            // Toggle do estado ativo
            const isOpen = card.classList.contains('active');
            
            // Se quiser que só um abra por vez, descomente abaixo:
            /*
            document.querySelectorAll('.food-card').forEach(c => {
                c.classList.remove('active');
                c.querySelector('.card-body').style.maxHeight = null;
            });
            */

            if (!isOpen) {
                card.classList.add('active');
                body.style.maxHeight = body.scrollHeight + "px";
            } else {
                card.classList.remove('active');
                body.style.maxHeight = null;
            }
        }
